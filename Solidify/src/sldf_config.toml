[Global]
# Global app settings
Solidify = true
# true uses each image's embedded alpha and ignores external mask filename matching.
# false uses files matching MaskNames as an external mask.
UseAlpha = true
# true multiplies embedded-alpha RGB by alpha before push-pull.
Premultiply = true
# Image-app gamma value. 2.2 applies alpha^(1/2.2). 1.0 disables gamma shaping.
AlphaGamma = 1.0
ExportAlpha = 0
MaskNames = ["_mask.", "_mask_", "_alpha.", "_alpha_"]
Console = true
Threads = 3
# 0 uses one queued task per worker thread
QueueLimit = 0
# 0 = fatal, 1 = error, 2 = warning, 3 = info, 4 = debug, 5 = trace
Verbosity = 3

[Normalize]
# Normalization settings
# NormalizeMode:
# 0 - disabled
# 1 - smart
# 2 - force
NormalizeMode = 1
# Normas substring to search in smart mode
NormalsNames = ["normal", "tangent", "object", "world"]

[Range]
# Range conversion mode
# 0 - Unsigned [0.0 ~ 1.0]
# 1 - Signed [-1.0 ~ 1.0]
# 2 - Signed to Unsigned [-1.0~1.0] -> [0.0~1.0]
# 3 - Unsigned to Signed [0.0~1.0] -> [-1.0~1.0]
RangeMode = 0

[Transform]
# Transform image
# +X+Y+Z is identity and disables swap/invert processing.
# SwapBasis:
# 0 - XYZ
# 1 - XZY
# 2 - YXZ
# 3 - YZX
# 4 - ZXY
# 5 - ZYX
SwapBasis = 0
# SwapInvertMask bits apply after basis swap: bit 0 first output channel,
# bit 1 second output channel, bit 2 third output channel.
# With SwapBasis = 0, SwapInvertMask = 0 means disabled.
SwapInvertMask = 0
# GrayscaleMode:
# 0 - disabled
# 1 - R only
# 2 - G only
# 3 - B only
# 4 - Mask/alpha
# 5 - Luminosity
# 6 - Equal
# 7 - Arbitrary
GrayscaleMode = 0
GrayscaleWeights = [0.2126, 0.7152, 0.0722]

[Export]
# Export settings
# FileFormat:
# -1 - Same as input. If input format can't be
#    used for export (for example CameraRAWs) 
#    app will use default 
# 0 - TIFF
# 1 - OpenEXR
# 2 - PNG
# 3 - JPEG
# 4 - JPEG-2000
# 5 - HTJ2K (.jph)
# 6 - HEIC
# 7 - JPEG XL
# 8 - PPM
DefaultFormat = 0
FileFormat = -1
# Bit depth: 
# -1 - Original
# 0 - uint8 (8bit unsigned int)
# 1 - uint16 (16bit unsigned int)
# 2 - uint32 (64bit unsigned int) !! most file formats have not support 32bit unsigned int
# 3 - uint64 (64bit unsigned int) !! most file formats have not support double precision
# 4 - half (16bit float)
# 5 - float (32bit float)
# 6 - double (64bit float) !! most file formats have not support double precision
DefaultBit = 1
BitDepth = -1

[Encoding]
# TIFF: zip, deflate, lzw, packbits, none. TIFF JPEG is disabled in the current OIIO build.
TiffCompression = "zip"
TiffZipLevel = 6
# OpenEXR: zip, zips, piz, pxr24, rle, b44, b44a, dwaa, dwab, htj2k256, htj2k32, none
OpenEXRCompression = "zip"
OpenEXRZipLevel = 4
OpenEXRDwaLevel = 45
# PNG strategy: default, filtered, huffman, rle, fixed, pngfast, none
PngStrategy = "default"
PngLevel = 4
JpegQuality = 100
JpegSubsampling = "4:4:4"
# JPEG-2000 uses OpenJPEG. HTJ2K uses OpenJPH and writes .jph.
# Jpeg2000QStep <= 0 keeps HTJ2K lossless/reversible.
Jpeg2000QStep = -1.0
HeicQuality = 100
JpegXLQuality = 100
JpegXLEffort = 7
JpegXLSpeed = 0

[CameraRaw]
# Raw rotation:
# -1 - Auto EXIF
# 0 - Unrotated/Horisontal
# 3 - 180 Horisontal
# 5 - 90 CW Vertical
# 6 - 90 CCW Vertical
RawRotation = -1
